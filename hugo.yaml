# -----------------------------------------------------------------------------
# Hugo configuration — Microsoft 365 & Security Copilot Blog
# Theme: PaperMod (https://github.com/adityatelange/hugo-PaperMod)
# -----------------------------------------------------------------------------

baseURL: "https://dimosatteia.github.io/"   # <-- change after creating the GitHub repo
languageCode: "en-us"
title: "Microsoft Security Insights"
theme: "PaperMod"
defaultContentLanguage: "en"

# Pagination & build
pagination:
  pagerSize: 10
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true

# Better URLs
canonifyURLs: true

# -----------------------------------------------------------------------------
# Outputs (RSS + JSON for built-in search)
# -----------------------------------------------------------------------------
outputs:
  home:
    - HTML
    - RSS
    - JSON

# -----------------------------------------------------------------------------
# Taxonomies — categories, tags, and series (great for multi-part deep dives)
# -----------------------------------------------------------------------------
taxonomies:
  category: categories
  tag: tags
  series: series

# -----------------------------------------------------------------------------
# Markdown rendering
# -----------------------------------------------------------------------------
markup:
  highlight:
    style: github-dark
    lineNos: false
    codeFences: true
    guessSyntax: true
    noClasses: false
  goldmark:
    renderer:
      unsafe: true   # allows raw HTML in markdown (needed for callouts, embeds)
  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: false

# -----------------------------------------------------------------------------
# PaperMod theme parameters
# -----------------------------------------------------------------------------
params:
  env: production
  title: "Microsoft Security Insights"
  description: "Practical, hands-on content on Microsoft 365 and Microsoft Security Copilot from a Senior Cloud Architect."
  keywords:
    - Microsoft 365
    - Microsoft Security Copilot
    - Microsoft Defender
    - Microsoft Sentinel
    - Microsoft Entra
    - Security Architecture
    - Cloud Security
  author: "Dimosthenis Atteia"   # <-- change to your public name/handle
  url: "https://dimosatteia.github.io/about/"
  DateFormat: "January 2, 2006"
  defaultTheme: auto       # auto | dark | light
  disableThemeToggle: false
  
  sitemap:
  changefreq: "weekly"
  priority: 0.5
  filename: "sitemap.xml"

  # UI behaviour
  ShowReadingTime: true
  ShowShareButtons: true
  ShareButtons: ["linkedin", "x", "reddit"]
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  comments: false           # set true if you wire up Giscus/Utterances later
  hideMeta: false
  disableScrollToTop: false

  # Search (Fuse.js, built into PaperMod)
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  # Profile-style homepage (use this OR homeInfoParams below, not both)
  # ---------------------------------------------------------------------------
  # profileMode:
  #   enabled: false
  #   title: "Dimosthenis | Senior Cloud Architect"
  #   subtitle: "Microsoft 365 & Microsoft Security Copilot"
  #   imageUrl: "/images/avatar.jpg"
  #   imageWidth: 160
  #   imageHeight: 160
  #   buttons:
  #     - name: Blog
  #       url: posts
  #     - name: About
  #       url: about

  # Standard homepage banner
  homeInfoParams:
    Title: "Hi 👋, I'm Dimosthenis"
    Content: >
      ![Dimosthenis](/images/Dimos_Banner.png)

      **Senior Cloud Architect** focused on **Microsoft 365** and **Microsoft Security Copilot**, with extensive hands‑on experience designing, securing, and operating enterprise‑scale environments.
      

      In parallel, I serve as **CIO/CISO** at the second‑largest flour milling and food manufacturing organization in Greece, where I apply **Microsoft Security** technologies in real‑world, high‑impact production scenarios.
      
      
      I write deep‑dive technical content for security architects, IT professionals, and administrators who actively run these platforms in production—covering hardening guides, configuration walkthroughs, real‑world detections, and lessons learned the hard way.
      
      This dual role allows me to translate complex security challenges into practical guidance, community content, and actionable best practices for the Microsoft professional community.


      Pick a topic from the menu above, or start with the latest posts below.

  # Social links — show as icons in the header
  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/dimosthenisatteia/"
    - name: github
      url: "https://github.com/dimosatteia"

  # Edit on GitHub (great for community contributions)
  editPost:
    URL: "https://github.com/dimosatteia/ms-security-blog/edit/main/content"
    Text: "Suggest an edit"
    appendFilePath: true

  # Cover images per post (default behaviour)
  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
    responsiveImages: true

  # Assets / favicons
  assets:
    disableHLJS: true        # we use Hugo Chroma for highlighting
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-96x96.png"
    favicon32x32: "/favicon-96x96.png"
    apple_touch_icon: "/apple-touch-icon.png"

# -----------------------------------------------------------------------------
# Top navigation menu
# -----------------------------------------------------------------------------
menu:
  main:
    - identifier: posts
      name: Blog
      url: /posts/
      weight: 10
    - identifier: series
      name: Series
      url: /series/
      weight: 20
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 30
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 40
    - identifier: about
      name: About
      url: /about/
      weight: 50
    - identifier: search
      name: 🔍
      url: /search/
      weight: 60

# -----------------------------------------------------------------------------
# Privacy
# -----------------------------------------------------------------------------
privacy:
  googleAnalytics:
    disable: true
  x:
    enableDNT: true
  vimeo:
    enableDNT: true
  youtube:
    privacyEnhanced: true
