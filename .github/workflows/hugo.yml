name: Deploy Hugo site to GitHub Pages

on:
  # Build on push to main
  push:
    branches:
      - main
  # Allow manual run from the Actions tab
  workflow_dispatch:

# GITHUB_TOKEN permissions for Pages deploy
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, cancel queued runs in between
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Build job — install Hugo, build the site, upload artifact
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.157.0"
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo npm install -g sass

      - name: Checkout repository (with submodules for theme)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Node.js dependencies (if any)
        run: |
          if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            npm ci
          fi

      - name: Build site with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/Athens
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Notify IndexNow
        run: |
          curl -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
               "host": "dimosatteia.github.io",
               "key": "${{ secrets.INDEXNOW_KEY }}",
               "keyLocation": "https://dimosatteia.github.io/${{ secrets.INDEXNOW_KEY }}.txt",
               "urlList": [
                 "https://dimosatteia.github.io/posts/secure-score-grc-part-2-ecosystem/"
                          ]
                }'

  # ---------------------------------------------------------------------------
  # Deploy job — push the built site to GitHub Pages
  # ---------------------------------------------------------------------------
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
